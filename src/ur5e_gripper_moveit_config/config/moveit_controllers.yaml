# MoveIt uses this configuration for controller management
# controller_names here should be the same as those in ros2 control

controller_names:
  - ur5e_arm_controller
  - gripper_controller
  - right_ur5e_arm_controller
  - right_gripper_controller
  
ur5e_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

gripper_controller:
  type: GripperCommand
  joints:
    - robotiq_85_left_knuckle_joint
  action_ns: gripper_cmd
  default: true

right_ur5e_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: false
  joints:
    - right_shoulder_pan_joint
    - right_shoulder_lift_joint
    - right_elbow_joint
    - right_wrist_1_joint
    - right_wrist_2_joint
    - right_wrist_3_joint

right_gripper_controller:
  type: GripperCommand
  joints:
    - right_robotiq_85_left_knuckle_joint
  action_ns: gripper_cmd
  default: false

